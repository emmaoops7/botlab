<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>home - 华亚幸福家</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>tailwind.config={theme:{extend:{colors:{primary:'#1890FF',primaryLight:'#40A9FF',primaryDark:'#096DD9',warmOrange:'#FF6B35',bgGray:'#F5F7FA',textMain:'#1F2937',textSub:'#6B7280',borderLight:'#E5E7EB'}}}}</script>
  <link rel="stylesheet" href="../assets/common.css">
</head>
<body class="bg-bgGray" data-page="home">
<div class="app-shell">
<div id="toast" class="toast fixed top-4 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-lg z-50 whitespace-nowrap"></div>
<div id="page-home" class="page">
  <!-- 顶部导航 -->
  <div class="bg-gradient-to-r from-primary to-primaryDark text-white px-4 py-3 flex items-center justify-between sticky top-0 z-40">
    <button onclick="navTo('login')" class="text-white">
      <i class="fas fa-home text-lg"></i>
    </button>
    <h1 class="text-lg font-semibold">华亚幸福家</h1>
    <div class="w-6"></div>
  </div>

  <!-- Banner -->
  <div class="relative overflow-hidden">
    <div id="banner" class="flex transition-transform duration-300">
      <div class="min-w-full h-40 bg-gradient-to-r from-blue-400 to-blue-600 flex items-center justify-center">
        <div class="text-white text-center px-4">
          <i class="fas fa-building text-4xl mb-2"></i>
          <p class="text-lg font-semibold">智慧社区 美好生活</p>
        </div>
      </div>
      <div class="min-w-full h-40 bg-gradient-to-r from-orange-400 to-orange-600 flex items-center justify-center">
        <div class="text-white text-center px-4">
          <i class="fas fa-users text-4xl mb-2"></i>
          <p class="text-lg font-semibold">贴心服务 温暖相伴</p>
        </div>
      </div>
      <div class="min-w-full h-40 bg-gradient-to-r from-green-400 to-green-600 flex items-center justify-center">
        <div class="text-white text-center px-4">
          <i class="fas fa-shield-alt text-4xl mb-2"></i>
          <p class="text-lg font-semibold">安全守护 安心居住</p>
        </div>
      </div>
    </div>
    <div class="absolute bottom-3 left-1/2 -translate-x-1/2 flex gap-2">
      <span class="banner-dot active w-5 h-2 bg-white/60 rounded-full"></span>
      <span class="banner-dot w-5 h-2 bg-white/60 rounded-full"></span>
      <span class="banner-dot w-5 h-2 bg-white/60 rounded-full"></span>
    </div>
  </div>

  <!-- 金刚区 1 行 4 列 -->
  <div class="bg-white mt-2 py-4">
    <div class="grid grid-cols-4 gap-4 px-4">
      <div class="menu-item text-center" onclick="navTo('payment')">
        <div class="w-12 h-12 mx-auto bg-blue-100 rounded-full flex items-center justify-center">
          <i class="fas fa-file-invoice-dollar text-primary text-xl"></i>
        </div>
        <p class="text-xs mt-2 text-textMain">缴费</p>
      </div>
      <div class="menu-item text-center" onclick="navTo('repair')">
        <div class="w-12 h-12 mx-auto bg-orange-100 rounded-full flex items-center justify-center">
          <i class="fas fa-tools text-warmOrange text-xl"></i>
        </div>
        <p class="text-xs mt-2 text-textMain">报修</p>
      </div>
      <div class="menu-item text-center" onclick="navTo('notice-detail')">
        <div class="w-12 h-12 mx-auto bg-green-100 rounded-full flex items-center justify-center">
          <i class="fas fa-bullhorn text-green-600 text-xl"></i>
        </div>
        <p class="text-xs mt-2 text-textMain">公告</p>
      </div>
      <div class="menu-item text-center" onclick="navTo('property')">
        <div class="w-12 h-12 mx-auto bg-purple-100 rounded-full flex items-center justify-center">
          <i class="fas fa-home text-purple-600 text-xl"></i>
        </div>
        <p class="text-xs mt-2 text-textMain">家业</p>
      </div>
    </div>
  </div>

  <!-- 最新公告 -->
  <div class="mt-3 px-4">
    <div class="card p-4">
      <div class="flex items-center justify-between mb-3">
        <h3 class="font-semibold text-textMain">最新公告</h3>
        <button class="text-primary text-sm" onclick="navTo('notice-detail')">查看更多 <i class="fas fa-chevron-right text-xs"></i></button>
      </div>
      <div class="space-y-3">
        <div class="flex items-start gap-3 pb-3 border-b border-borderLight" onclick="navTo('notice-detail')">
          <i class="fas fa-bullhorn text-primary mt-1"></i>
          <div class="flex-1">
            <p class="text-sm text-textMain">关于小区停水通知</p>
            <p class="text-xs text-textSub mt-1">2026-04-15</p>
          </div>
        </div>
        <div class="flex items-start gap-3 pb-3 border-b border-borderLight" onclick="navTo('notice-detail')">
          <i class="fas fa-info-circle text-green-600 mt-1"></i>
          <div class="flex-1">
            <p class="text-sm text-textMain">电梯维护保养公告</p>
            <p class="text-xs text-textSub mt-1">2026-04-14</p>
          </div>
        </div>
        <div class="flex items-start gap-3" onclick="navTo('notice-detail')">
          <i class="fas fa-exclamation-triangle text-warmOrange mt-1"></i>
          <div class="flex-1">
            <p class="text-sm text-textMain">台风天气安全提示</p>
            <p class="text-xs text-textSub mt-1">2026-04-13</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ==================== 登录页 ==================== -->
<!-- ==================== 底部导航栏 ==================== -->
<div id="tab-bar" class="fixed bottom-0 left-0 right-0 bg-white border-t border-borderLight px-2 py-2 z-40">
  <div class="flex justify-around">
    <button class="tab-btn active flex-1 text-center py-2" data-page="home" onclick="navTo('home')">
      <i class="fas fa-home text-xl"></i>
      <p class="text-xs mt-1">首页</p>
    </button>
    <button class="tab-btn flex-1 text-center py-2" data-page="payment" onclick="navTo('payment')">
      <i class="fas fa-file-invoice-dollar text-xl"></i>
      <p class="text-xs mt-1">缴费</p>
    </button>
    <button class="tab-btn flex-1 text-center py-2" data-page="my" onclick="navTo('my')">
      <i class="fas fa-user text-xl"></i>
      <p class="text-xs mt-1">我的</p>
    </button>
  </div>
</div>
</div>
<script src="../assets/app.js"></script>
</body>
</html>
