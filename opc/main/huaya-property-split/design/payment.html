<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=390, initial-scale=1.0"><title>payment 画板 - 华亚幸福家</title><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><script>tailwind.config={theme:{extend:{colors:{primary:'#1890FF',primaryLight:'#40A9FF',primaryDark:'#096DD9',warmOrange:'#FF6B35',bgGray:'#F5F7FA',textMain:'#1F2937',textSub:'#6B7280',borderLight:'#E5E7EB'}}}}</script><link rel="stylesheet" href="../assets/common.css"><link rel="stylesheet" href="design.css"></head><body><div class="frame">
<div id="page-payment" class="page">
  <div class="bg-gradient-to-r from-primary to-primaryDark text-white px-4 py-3 sticky top-0 z-40">
    <h1 class="text-lg font-semibold text-center">费用缴纳</h1>
  </div>

  <div class="p-4">
    <!-- 待缴账单 -->
    <div class="card p-5 mb-4">
      <p class="text-textSub text-sm">待缴金额</p>
      <p class="text-4xl font-bold text-warmOrange mt-2">¥ 358.50</p>
      <p class="text-xs text-textSub mt-2">共 4 项费用待缴纳</p>
      <button class="btn-primary w-full text-white py-3 rounded-lg font-semibold mt-4">
        立即缴费
      </button>
    </div>

    <!-- 费用明细 -->
    <div class="card mb-4">
      <div class="p-4 border-b border-borderLight">
        <h3 class="font-semibold text-textMain">费用明细</h3>
      </div>
      <div class="divide-y divide-borderLight">
        <div class="p-4 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center">
              <i class="fas fa-tint text-primary"></i>
            </div>
            <div>
              <p class="text-sm font-medium text-textMain">水费</p>
              <p class="text-xs text-textSub mt-0.5">2026-03</p>
            </div>
          </div>
          <div class="text-right">
            <p class="text-lg font-semibold text-textMain">¥ 45.00</p>
            <span class="inline-block px-2 py-0.5 bg-red-100 text-red-600 text-xs rounded">未缴</span>
          </div>
        </div>
        <div class="p-4 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-yellow-100 rounded-full flex items-center justify-center">
              <i class="fas fa-bolt text-yellow-600"></i>
            </div>
            <div>
              <p class="text-sm font-medium text-textMain">电费</p>
              <p class="text-xs text-textSub mt-0.5">2026-03</p>
            </div>
          </div>
          <div class="text-right">
            <p class="text-lg font-semibold text-textMain">¥ 128.50</p>
            <span class="inline-block px-2 py-0.5 bg-red-100 text-red-600 text-xs rounded">未缴</span>
          </div>
        </div>
        <div class="p-4 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center">
              <i class="fas fa-building text-green-600"></i>
            </div>
            <div>
              <p class="text-sm font-medium text-textMain">物业费</p>
              <p class="text-xs text-textSub mt-0.5">2026-Q2</p>
            </div>
          </div>
          <div class="text-right">
            <p class="text-lg font-semibold text-textMain">¥ 165.00</p>
            <span class="inline-block px-2 py-0.5 bg-red-100 text-red-600 text-xs rounded">未缴</span>
          </div>
        </div>
        <div class="p-4 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-purple-100 rounded-full flex items-center justify-center">
              <i class="fas fa-car text-purple-600"></i>
            </div>
            <div>
              <p class="text-sm font-medium text-textMain">停车费</p>
              <p class="text-xs text-textSub mt-0.5">2026-04</p>
            </div>
          </div>
          <div class="text-right">
            <p class="text-lg font-semibold text-textMain">¥ 20.00</p>
            <span class="inline-block px-2 py-0.5 bg-red-100 text-red-600 text-xs rounded">未缴</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 缴费记录 -->
    <div class="card">
      <div class="p-4 border-b border-borderLight">
        <h3 class="font-semibold text-textMain">缴费记录</h3>
      </div>
      <div class="divide-y divide-borderLight">
        <div class="p-4 flex items-center justify-between">
          <div>
            <p class="text-sm font-medium text-textMain">物业费</p>
            <p class="text-xs text-textSub mt-1">2026-03-15 14:30</p>
          </div>
          <div class="text-right">
            <p class="text-lg font-semibold text-primary">¥ 165.00</p>
            <span class="inline-block px-2 py-0.5 bg-green-100 text-green-600 text-xs rounded">已缴费</span>
          </div>
        </div>
        <div class="p-4 flex items-center justify-between">
          <div>
            <p class="text-sm font-medium text-textMain">水费</p>
            <p class="text-xs text-textSub mt-1">2026-02-10 09:15</p>
          </div>
          <div class="text-right">
            <p class="text-lg font-semibold text-primary">¥ 38.00</p>
            <span class="inline-block px-2 py-0.5 bg-green-100 text-green-600 text-xs rounded">已缴费</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ==================== 立即缴费页 ==================== -->
<!-- ==================== 底部导航栏 ==================== -->
<div id="tab-bar" class="fixed bottom-0 left-0 right-0 bg-white border-t border-borderLight px-2 py-2 z-40">
  <div class="flex justify-around">
    <button class="tab-btn active flex-1 text-center py-2" data-page="home">
      <i class="fas fa-home text-xl"></i>
      <p class="text-xs mt-1">首页</p>
    </button>
    <button class="tab-btn flex-1 text-center py-2" data-page="payment">
      <i class="fas fa-file-invoice-dollar text-xl"></i>
      <p class="text-xs mt-1">缴费</p>
    </button>
    <button class="tab-btn flex-1 text-center py-2" data-page="my">
      <i class="fas fa-user text-xl"></i>
      <p class="text-xs mt-1">我的</p>
    </button>
  </div>
</div>
</div></body></html>
