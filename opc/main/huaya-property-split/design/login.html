<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=390, initial-scale=1.0"><title>login 画板 - 华亚幸福家</title><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><script>tailwind.config={theme:{extend:{colors:{primary:'#1890FF',primaryLight:'#40A9FF',primaryDark:'#096DD9',warmOrange:'#FF6B35',bgGray:'#F5F7FA',textMain:'#1F2937',textSub:'#6B7280',borderLight:'#E5E7EB'}}}}</script><link rel="stylesheet" href="../assets/common.css"><link rel="stylesheet" href="design.css"></head><body><div class="frame">
<div id="page-login" class="page">
  <div class="min-h-screen bg-gradient-to-b from-primary to-primaryDark flex flex-col items-center justify-center px-8">
    <div class="text-white text-center mb-12">
      <i class="fas fa-building text-6xl mb-4"></i>
      <h1 class="text-2xl font-bold">华亚幸福家</h1>
      <p class="text-white/80 mt-2">智慧社区 美好生活</p>
    </div>

    <div class="card w-full p-6">
      <div class="mb-4">
        <label class="block text-sm text-textSub mb-2">手机号</label>
        <input type="tel" id="login-phone" placeholder="请输入手机号" maxlength="11"
          class="input-field w-full px-4 py-3 rounded-lg text-textMain">
      </div>
      <div class="mb-6">
        <label class="block text-sm text-textSub mb-2">验证码</label>
        <div class="flex gap-2">
          <input type="text" id="login-code" placeholder="请输入验证码" maxlength="6"
            class="input-field flex-1 px-4 py-3 rounded-lg text-textMain">
          <button id="send-code-btn"
            class="btn-primary text-white px-4 py-3 rounded-lg text-sm whitespace-nowrap">
            获取验证码
          </button>
        </div>
      </div>
      <button class="btn-primary w-full text-white py-3 rounded-lg font-semibold text-lg">
        登录
      </button>
      <p class="text-xs text-textSub text-center mt-4">
        登录即代表您同意 <a href="#" class="text-primary">《用户协议》</a> 和 <a href="#" class="text-primary">《隐私政策》</a>
      </p>
    </div>
  </div>
</div>

<!-- ==================== 缴费页 ==================== -->

</div></body></html>
